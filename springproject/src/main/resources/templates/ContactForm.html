<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Contact Dashboard</title>
	<!-- Latest compiled and minified CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Latest compiled JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
	<h1>Welcome to the Contact Page</h1>
	<hr>
	<hr>
	<div class="container-fluid">
		<div class="card">
			<div class="card-header text-center bg-primary text-white">
				<h5>Send Email</h5>
			</div>
			<div class="card-body">

				<form action="/contact" method="post">
					<div class="row m-2">
						<div class="col-4">To Email</div>
						<div class="col-6">
							<input type="text" name="toEmail" class="form-control">
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Subject</div>
						<div class="col-6">
							<input type="text" name="subject" class="form-control">
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Message</div>
						<div class="col-6">
							<textarea rows="10" cols="" name="message" class="form-control"></textarea>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4"></div>
						<div class="col-6">
							<input type="submit" value="Send" class="btn btn-success">
						</div>
					</div>
				</form>
				
				<div class="text-center text-primary">[[${msg}]]</div>
				
			</div>
			<div class="card-footer text-center bg-secondary text-white">
				copyright@2026
			</div>
		</div>
	</div>
	<br>
	<a href="/login"
		style="background-color: darkred; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px;">Logout</a>
</body>

</html>
