<!DOCTYPE html>
<html>

<head>
	<title>Header</title>
</head>

<body>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

	<style>
		.navbar-brand-bold {
			font-weight: 700;
			font-size: 1.4rem;
			letter-spacing: 0.5px;
		}

		.welcome-text {
			color: #f1f1f1;
			margin-right: 10px;
		}
	</style>

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">

		<!--Front-Desk-->
		<a class="navbar-brand navbar-brand-bold">
			Spring-Project
		</a>

		<!-- Left side: Welcome text + Logout -->
		<div th:if="${session.activeUser}">
			<span class="welcome-text">
				Welcome, <strong>[[${session.activeUser.fname}]]</strong>
			</span>
			<a class="btn btn-outline-light btn-sm me-3" th:href="@{/logout}">
				Logout
			</a>
		</div>


		<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
			<span class="navbar-toggler-icon"></span>
		</button>

		<div class="collapse navbar-collapse" id="mainNavbar">

			<!-- Main Nav Links (right side) -->
			<ul class="navbar-nav ms-auto">

				<li class="nav-item">
					<a class="nav-link" href="/home">Home</a>
				</li>

				<!-- Department Dropdown -->
				<li class="nav-item dropdown">
					<a class="nav-link dropdown-toggle" href="#" id="departmentDropdown" role="button"
						data-bs-toggle="dropdown" aria-expanded="false">
						Department
					</a>
					<ul class="dropdown-menu" aria-labelledby="departmentDropdown">
						<li><a class="dropdown-item" href="/department">Add
								Department</a></li>
						<li><a class="dropdown-item" href="/departmentList">View
								Departments</a></li>
					</ul>
				</li>

				<!-- Employee Dropdown -->
				<li class="nav-item dropdown">
					<a class="nav-link dropdown-toggle" href="#" id="employeeDropdown" role="button"
						data-bs-toggle="dropdown" aria-expanded="false">
						Employee
					</a>
					<ul class="dropdown-menu" aria-labelledby="employeeDropdown">
						<li><a class="dropdown-item" href="/employee">Add
								Employee</a></li>
						<li><a class="dropdown-item" href="/employeeList">View
								Employees</a></li>
					</ul>
				</li>

				<li class="nav-item">
					<a class="nav-link" href="/gallery">Gallery</a>
				</li>

				<li class="nav-item">
					<a class="nav-link" href="/upload">Upload</a>
				</li>

				<li class="nav-item">
					<a class="nav-link" href="/contact">Contact</a>
				</li>

				<li class="nav-item">
					<a class="nav-link" href="/profile">Profile</a>
				</li>

			</ul>

		</div>
	</nav>
</body>

</html>
