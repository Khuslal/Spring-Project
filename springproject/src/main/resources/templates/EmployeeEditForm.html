<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Edit Employee</title>
	<!-- Latest compiled and minified CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<div th:replace="Header :: navbar"></div>
	<h1>Welcome to the Employee Edit Page</h1>
	<hr>
	<hr>
	<div class="container-fluid">
		<div class="card">
			<div class="card-header text-center bg-primary text-white">
				<h5>Employee Edit Form</h5>
			</div>
			<div class="card-body">

				<form action="/employee/update" method="post" th:object="${eModel}">
					<div class="row m-2">
						<div class="col-4">Employee Name</div>
						<div class="col-6">
							<input type="text" th:field="*{fname}" class="form-control">
							<input type="text" th:field="*{lname}" class="form-control">
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Phone</div>
						<div class="col-6">
							<input type="text" th:field="*{phone}" class="form-control">
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Email</div>
						<div class="col-6">
							<input type="text" th:field="*{email}" class="form-control">
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Gender</div>
						<div class="col-6">
							<input type="text" th:field="*{gender}" class="form-control">
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4"></div>
						<div class="col-6">
							<input type="submit" value="Update" class="btn btn-success">
						</div>
					</div>
					<input type="hidden" th:field="*{id}">
				</form>

			</div>
			<div class="card-footer text-center bg-secondary text-white">
				copyright@2026
			</div>
		</div>
	</div>
	<br>
	<a href="/login"
		style="background-color: darkred; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px;">Logout</a>

	<!-- Latest compiled JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
