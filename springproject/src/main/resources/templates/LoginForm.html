<!DOCTYPE html>
<html>

<head>
	<title>Login Form</title>
</head>

<body>
	<h1>Login Form</h1>
	<hr>

	<p style="color: red;">[[${error}]]</p><br>
	<form action="/login" method="post">
		<label>Username :</label>
		<input type="text" name="username">
		<br>
		<label>Password :</label>
		<input type="password" name="password">
		<br>
		<input type="submit" value="Login"
			style="font-size: 1.12rem; background-color: darkgreen; color: whitesmoke; border-radius: 5px; border: none; padding: 4px;">
	</form>
	<hr>
	<a href="/signup"
		style="background-color: royalblue; color: whitesmoke; border-radius: 5px; border: none; padding: 6px; text-decoration: none; font-size: 1.25rem;">Signup</a>
</body>

</html>
