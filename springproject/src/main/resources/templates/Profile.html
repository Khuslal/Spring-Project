<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Profile</title>
	<!-- Latest compiled and minified CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<div th:replace="Header :: navbar"></div>
	<h1>User Profile</h1>
	<hr>
	<hr>
	<div class="container-fluid">
		<div class="card">
			<div class="card-header text-center bg-primary text-white">
				<h5>User Profile</h5>
			</div>
			<div class="card-body">
				<div class="row m-2">
					<div class="col-4">First Name</div>
					<div class="col-6">
						[[${session.activeUser.fname}]]
					</div>
				</div>

				<div class="row m-2">
					<div class="col-4">Last Name</div>
					<div class="col-6">
						[[${session.activeUser.lname}]]
					</div>
				</div>

				<div class="row m-2">
					<div class="col-4">User Name</div>
					<div class="col-6">
						[[${session.activeUser.lname}]]
					</div>
				</div>
			</div>
			<div class="card-footer text-center bg-secondary text-white">
				copyright@2026
			</div>
		</div>
	</div>
	<br>
	<a href="/login"
		style="background-color: darkred; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px;">Logout</a>

	<!-- Latest compiled JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
