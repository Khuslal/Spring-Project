<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Employee Dashboard</title>

	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<div th:replace="Header :: navbar"></div>
	<h1 class="text-center mt-3">Welcome to the Employee Page</h1>
	<hr>
	<hr>

	<div class="container-fluid">
		<div class="card">

			<div class="card-header bg-primary text-white text-center">
				<h5>Employee Registration Form</h5>
			</div>

			<div class="card-body">

				<h5 class="text-success text-center">[[${message}]]</h5>

				<form th:action="@{/employee}" method="post">

					<div class="row m-2">
						<div class="col-4">First Name</div>
						<div class="col-6">
							<input type="text" name="fname" class="form-control" required>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Last Name</div>
						<div class="col-6">
							<input type="text" name="lname" class="form-control" required>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Email</div>
						<div class="col-6">
							<input type="email" name="email" class="form-control" required>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Phone</div>
						<div class="col-6">
							<input type="text" name="phone" class="form-control" required>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Gender</div>
						<div class="col-6">
							<select name="gender" class="form-select">
								<option value="">Select Gender</option>
								<option value="male">Male</option>
								<option value="female">Female</option>
							</select>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Date of Birth</div>
						<div class="col-6">
							<input type="date" name="dob" class="form-control">
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Company</div>
						<div class="col-6">
							<input type="text" name="company" class="form-control" required>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Post</div>
						<div class="col-6">
							<input type="text" name="post" class="form-control" required>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Salary</div>
						<div class="col-6">
							<input type="number" name="salary" class="form-control" required>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Join Date</div>
						<div class="col-6">
							<input type="date" name="joinDate" class="form-control">
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Country</div>
						<div class="col-6">
							<input type="text" name="address.country" class="form-control" required>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">State</div>
						<div class="col-6">
							<input type="text" name="address.state" class="form-control" required>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">City</div>
						<div class="col-6">
							<input type="text" name="address.city" class="form-control" required>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Zip Code</div>
						<div class="col-6">
							<input type="text" name="address.zipcode" class="form-control" required>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Department</div>
						<div class="col-6">
							<select name="departments" class="form-select">
								<option value="">Select Department</option>
								<option th:each="d : ${dList}" th:value="${d.id}" th:text="${d.deptName}">
								</option>
							</select>
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Projects</div>
						<div class="col-6">

							<div class="form-check">
								<input class="form-check-input" type="checkbox" name="projects" value="Project-1">
								<label class="form-check-label">Project-1</label>
							</div>

							<div class="form-check">
								<input class="form-check-input" type="checkbox" name="projects" value="Project-2">
								<label class="form-check-label">Project-2</label>
							</div>

							<div class="form-check">
								<input class="form-check-input" type="checkbox" name="projects" value="Project-3">
								<label class="form-check-label">Project-3</label>
							</div>

							<div class="form-check">
								<input class="form-check-input" type="checkbox" name="projects" value="Project-4">
								<label class="form-check-label">Project-4</label>
							</div>

							<div class="form-check">
								<input class="form-check-input" type="checkbox" name="projects" value="Project-5">
								<label class="form-check-label">Project-5</label>
							</div>

						</div>
					</div>

					<div class="row m-3">
						<div class="col-4"></div>
						<div class="col-6">
							<input type="submit" value="Register" class="btn btn-success">
							<input type="reset" value="Clear" class="btn btn-danger ms-2">
						</div>
					</div>

				</form>

			</div>

			<div class="card-footer text-center bg-secondary text-white">
				copyright@2026
			</div>

		</div>
	</div>

	<br>

	<div class="text-center">
		<a href="/logout" class="btn btn-danger">Logout</a>
	</div>

	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
```
