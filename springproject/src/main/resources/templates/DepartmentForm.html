<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Department Dashboard</title>
	<!-- Latest compiled and minified CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Latest compiled JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
	<h1>Welcome to the Department PAGE</h1>
	<hr>
	<hr>
	<div class="container-fluid">
		<div class="card">
			<div class="card-header text-center bg-primary text-white">
				<h5>Department Form</h5>
			</div>
			<div class="card-body">

				<form action="/department" method="post">
					<div class="row m-2">
						<div class="col-4">Department Name</div>
						<div class="col-6">
							<input type="text" name="deptName" class="form-control">
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Department Phone</div>
						<div class="col-6">
							<input type="text" name="deptPhone" class="form-control">
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4">Department Head (HoD)</div>
						<div class="col-6">
							<input type="text" name="deptHead" class="form-control">
						</div>
					</div>

					<div class="row m-2">
						<div class="col-4"></div>
						<div class="col-6">
							<input type="submit" value="Add" class="btn btn-success">
						</div>
					</div>
				</form>

			</div>
			<div class="card-footer text-center bg-secondary text-white">
				copyright@2026
			</div>
		</div>
	</div>
	<br>
	<a href="/login"
		style="background-color: darkred; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px;">Logout</a>
</body>

</html>
